<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APLink Loading</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 30% 25%, rgba(34, 211, 238, 0.22), transparent 52%),
          radial-gradient(circle at 75% 75%, rgba(34, 211, 238, 0.12), transparent 48%),
          #020817;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .wrap {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .ring,
      .ring::before,
      .ring::after {
        content: "";
        position: absolute;
        inset: 50%;
        transform: translate(-50%, -50%);
        border-radius: 9999px;
      }

      .ring {
        width: 250px;
        height: 250px;
        border: 1px solid rgba(34, 211, 238, 0.24);
        animation: pulse 2.4s ease-in-out infinite;
      }

      .ring::before {
        width: 200px;
        height: 200px;
        border: 1px solid rgba(34, 211, 238, 0.18);
        animation: pulse 2.4s ease-in-out infinite 0.35s;
      }

      .ring::after {
        width: 300px;
        height: 300px;
        border: 1px solid rgba(34, 211, 238, 0.12);
        animation: pulse 2.4s ease-in-out infinite 0.7s;
      }

      .logo-shell {
        width: 168px;
        height: 168px;
        border-radius: 9999px;
        background: radial-gradient(circle at 35% 25%, rgba(34, 211, 238, 0.28), rgba(7, 16, 34, 0.95));
        border: 1px solid rgba(34, 211, 238, 0.28);
        box-shadow:
          0 0 24px rgba(34, 211, 238, 0.45),
          0 0 64px rgba(34, 211, 238, 0.28),
          inset 0 0 24px rgba(34, 211, 238, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: float 2.6s ease-in-out infinite;
      }

      .logo {
        width: 118px;
        height: 118px;
        object-fit: contain;
        filter: drop-shadow(0 0 18px rgba(34, 211, 238, 0.8));
      }

      .title {
        position: absolute;
        bottom: 66px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(234, 251, 255, 0.92);
        font-size: 12px;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.7;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.06);
          opacity: 0.35;
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap" aria-label="APLink splash screen">
      <div class="ring" aria-hidden="true"></div>
      <div class="logo-shell">
        <img class="logo" src="./assets/aplink-logo.png" alt="APLink logo" />
      </div>
      <div class="title">APLink</div>
    </main>
  </body>
</html>
